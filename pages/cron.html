                    <!-- =================== CRON PAGE =================== -->
                    <div id="page-cron" class="page">
                        <div class="cron-page" style="max-width: 1440px; margin: 0 auto; padding: 24px;">
                            <div class="page-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; gap: 16px; flex-wrap: wrap;">
                                <div>
                                    <h1 class="page-title">⏰ Cron Jobs</h1>
                                    <p class="page-subtitle">Manage scheduled tasks and automation without losing your place</p>
                                </div>
                                <div style="display: flex; gap: 8px; flex-wrap: wrap;">
                                    <button onclick="refreshCronDiagnostics()" class="btn btn-ghost" style="padding: 8px 16px;">Refresh diagnostics</button>
                                    <button onclick="copyCronListJson()" class="btn btn-ghost" style="padding: 8px 16px;">Copy list JSON</button>
                                    <button onclick="exportCronListJson()" class="btn btn-ghost" style="padding: 8px 16px;">Export list JSON</button>
                                    <button onclick="openAddCronModal()" class="btn btn-primary" style="padding: 8px 16px;">+ Add Job</button>
                                </div>
                            </div>

                            <div style="display: grid; grid-template-columns: minmax(300px, 420px) minmax(0, 1fr); gap: 18px; align-items: start;">
                                <div id="cron-list-view" style="display: grid; gap: 14px; min-width: 0;">
                                    <div style="background: var(--surface-1); border: 1px solid var(--border-default); border-radius: var(--radius-lg); padding: 14px; display: grid; gap: 12px; position: sticky; top: 16px; z-index: 1;">
                                        <div style="display: flex; justify-content: space-between; align-items: center; gap: 10px; flex-wrap: wrap;">
                                            <div>
                                                <div style="font-size: 13px; font-weight: 700;">Jobs overview</div>
                                                <div id="cron-list-meta" style="font-size: 11px; color: var(--text-muted);">Loading jobs…</div>
                                            </div>
                                            <button onclick="closeCronDetailView()" class="btn btn-ghost" style="padding: 6px 10px;">Clear selection</button>
                                        </div>
                                        <input id="cron-search-input" type="text" class="input" placeholder="Search by name, ID, payload, or schedule" style="width: 100%;">
                                        <div id="cron-filter-bar" style="display: flex; gap: 8px; flex-wrap: wrap;">
                                            <button onclick="setCronListFilter('all')" class="btn btn-ghost" data-cron-filter="all" style="padding: 6px 10px;">All</button>
                                            <button onclick="setCronListFilter('failing')" class="btn btn-ghost" data-cron-filter="failing" style="padding: 6px 10px;">Failing</button>
                                            <button onclick="setCronListFilter('healthy')" class="btn btn-ghost" data-cron-filter="healthy" style="padding: 6px 10px;">Healthy</button>
                                            <button onclick="setCronListFilter('disabled')" class="btn btn-ghost" data-cron-filter="disabled" style="padding: 6px 10px;">Disabled</button>
                                            <button onclick="setCronListFilter('recent')" class="btn btn-ghost" data-cron-filter="recent" style="padding: 6px 10px;">Recently run</button>
                                        </div>
                                    </div>

                                    <div id="cron-jobs-list">
                                        <div class="empty-state">Loading cron jobs...</div>
                                    </div>
                                </div>

                                <div id="cron-detail-view" style="min-width: 0;">
                                    <div style="position: sticky; top: 16px; display: grid; gap: 18px;">
                                        <div class="page-header" style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0; gap: 16px; flex-wrap: wrap; background: var(--surface-1); border: 1px solid var(--border-default); border-radius: var(--radius-lg); padding: 16px;">
                                            <div>
                                                <div style="font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 8px;">Selected job</div>
                                                <h1 id="cron-detail-title" class="page-title" style="margin-bottom: 6px;">Select a cron job</h1>
                                                <p id="cron-detail-subtitle" class="page-subtitle" style="margin-bottom: 0;">Choose a job on the left to inspect its schedule, failures, and recent runs.</p>
                                            </div>
                                            <div style="display: flex; gap: 8px; flex-wrap: wrap;">
                                                <button id="cron-detail-copy-btn" class="btn btn-ghost">Copy timeline JSON</button>
                                                <button id="cron-detail-export-btn" class="btn btn-ghost">Export timeline JSON</button>
                                                <button id="cron-detail-run-btn" class="btn btn-ghost">Run now</button>
                                                <button id="cron-detail-refresh-btn" class="btn btn-primary">Refresh timeline</button>
                                            </div>
                                        </div>

                                        <div id="cron-detail-summary" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px;"></div>
                                        <div id="cron-detail-error" class="hidden" style="background: color-mix(in srgb, var(--error) 12%, transparent); border: 1px solid color-mix(in srgb, var(--error) 35%, var(--border-default)); border-radius: var(--radius-md); padding: 14px;"></div>
                                        <div id="cron-detail-meta" style="background: var(--surface-1); border: 1px solid var(--border-default); border-radius: var(--radius-md); padding: 14px;"></div>
                                        <div id="cron-detail-timeline" style="display: grid; gap: 14px;"></div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Add Cron Modal -->
                        <div id="add-cron-modal" class="modal-overlay">
                            <div class="modal" style="max-width: 480px;">
                                <div class="modal-header">
                                    <h2>Add Cron Job</h2>
                                    <button onclick="closeAddCronModal()" class="btn-icon">✕</button>
                                </div>
                                <div class="modal-body" style="padding: 16px;">
                                    <div style="margin-bottom: 12px;">
                                        <label style="font-size: 12px; font-weight: 600; display: block; margin-bottom: 4px;">Name</label>
                                        <input type="text" id="cron-new-name" class="input" placeholder="My cron job" style="width: 100%;">
                                    </div>
                                    <div style="margin-bottom: 12px;">
                                        <label style="font-size: 12px; font-weight: 600; display: block; margin-bottom: 4px;">Schedule (cron expression)</label>
                                        <input type="text" id="cron-new-schedule" class="input" placeholder="0 9 * * *" style="width: 100%;">
                                    </div>
                                    <div style="margin-bottom: 16px;">
                                        <label style="font-size: 12px; font-weight: 600; display: block; margin-bottom: 4px;">Command / Action</label>
                                        <textarea id="cron-new-command" class="input" placeholder="What should this job do?" rows="3" style="width: 100%; resize: vertical;"></textarea>
                                    </div>
                                    <div style="display: flex; justify-content: flex-end; gap: 8px;">
                                        <button onclick="closeAddCronModal()" class="btn btn-ghost">Cancel</button>
                                        <button onclick="submitNewCronJob()" class="btn btn-primary">Add Job</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <!-- END CRON PAGE -->
